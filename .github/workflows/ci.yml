name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest --tb=short -v

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy types-requests

      - name: Run ruff (lint)
        run: ruff check src/

      - name: Run mypy (type check)
        run: mypy src/ --strict

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install safety
        run: pip install safety

      - name: Check dependencies
        run: safety check --file=pyproject.toml || true

  validate-config:
    name: Config Validation
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate config schema
        run: |
          python -c "
            from src.direct_indexing.config import AppConfig, AlpacaConfig, TLHConfig
            from dataclasses import asdict
            import json
            # Test that config can be serialized
            cfg = AppConfig()
            json.dumps(asdict(cfg))
            print('Config serialization: OK')
            
            # Test env override
            import os
            os.environ['ALPACA_API_KEY'] = 'test_key'
            from src.direct_indexing.config import AppConfig
            cfg = AppConfig.from_env()
            assert cfg.alpaca.api_key == 'test_key'
            print('Env config loading: OK')
          "